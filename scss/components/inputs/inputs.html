<body>
    <section class="inputs">
        <h1>Inputs</h1>
      
        <div class="inputs-grid">
      
            <div class="input-group">
                <label>Date</label>
                <div class="input-wrapper">
                  <input id="date-input" type="date">              
                  <i id="calendar-btn" class="icon icon-calendar"></i>
                </div>
              </div>

          <script>
            const input = document.getElementById("date-input");
            const icon = document.getElementById("calendar-btn");
          
            icon.addEventListener("click", () => {
              if (input.showPicker) {
                input.showPicker(); // modern browsers
              } else {
                input.focus(); // fallback
              }
            });
          </script>
      
          <div class="input-group">
            <label>Search</label>
            <div class="input-wrapper">
              <input type="search" placeholder="Search">
              <i class="icon icon-search"></i>
            </div>
          </div>
      
          <div class="input-group has-error">
            <label>URL</label>
            <div class="input-wrapper">
              <input type="text" placeholder="URL">
              <i class="icon icon-error"></i>
            </div>
            <p class="error-message">Error Message</p>
          </div>
      
          <div class="input-group">
            <label>Email</label>
            <div class="input-wrapper">
              <input type="email" placeholder="example@email.com">
              <i class="icon icon-email"></i>
            </div>
          </div>
      
          <div class="input-group">
            <label>Phone</label>
            <div class="input-wrapper">
              <input type="tel" placeholder="+353 00000000">
              <i class="icon icon-phone"></i>
            </div>
          </div>
      
          <div class="input-group is-disabled">
            <label>URL</label>
            <div class="input-wrapper">
              <input type="text" placeholder="URL" disabled>
              <i class="icon icon-link"></i>
            </div>
            <p class="helper-text">Unavailable Input</p>
          </div>
      
          <div class="input-group">
            <label>Quantity</label>
            <div class="input-wrapper">
              <input type="number" placeholder="000">
              <div class="input-actions">
                <button class="icon-button">+</button>
                <button class="icon-button">−</button>
              </div>
            </div>
          </div>
  
          <div class="input-group">
            <label>Time</label>
            <div class="input-wrapper">
              <input type="text" placeholder="00:00">
              <i class="icon icon-time"></i>
            </div>
          </div>
  
          <div class="input-group">
            <label>Password</label>
            <div class="input-wrapper">
              <input type="password" placeholder="--------">
              <i class="icon icon-eye"></i>
            </div>
          </div>
  
          <div class="input-group">
            <label>Eircode</label>
            <div class="input-wrapper">
              <input type="text" placeholder="Eircode">
              <i class="icon icon-location"></i>
            </div>
          </div>
  
          <div class="input-group">
            <label>URL</label>
            <div class="input-wrapper">
              <input type="url" placeholder="URL">
              <i class="icon icon-link"></i>
            </div>
          </div>
        </div>
      </section>
  </body>
  </html>
