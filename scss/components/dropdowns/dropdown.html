<body>

    <h1>Dropdown</h1>
    
    <p>...</p>

        </br>

        <div class="dropdown">
            <button class="dropdown__toggle">
              Select an item
              <span class="dropdown__arrow"></span>
            </button>
          
            <ul class="dropdown__menu">
              <li class="dropdown__item">Select an item</li>
              <li class="dropdown__item dropdown__item--active">Item 1</li>
              <li class="dropdown__item">Item 2</li>
              <li class="dropdown__item">Item 3</li>
              <li class="dropdown__item">Item 4</li>
              <li class="dropdown__item">Item 5</li>
              <li class="dropdown__item">Item 6</li>
            </ul>
          </div>

          <script>
            const dropdown = document.querySelector(".dropdown");
            const toggle = document.querySelector(".dropdown__toggle");
          
            toggle.addEventListener("click", () => {
              dropdown.classList.toggle("is-open");
            });
          </script>

</body>
