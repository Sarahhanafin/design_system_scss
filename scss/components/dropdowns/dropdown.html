<body>

    <h1>Dropdown</h1>
    
    <p>...</p>

        </br>

        <div class="dropdown">
            <button class="dropdown__toggle" id="dropdownBtn">
              Select an option <span class="arrow">▾</span>
            </button>
          
            <ul class="dropdown__menu" id="dropdownMenu">
              <li class="dropdown__item">Profile</li>
              <li class="dropdown__item">Settings</li>
              <li class="dropdown__item">Notifications</li>
              <li class="dropdown__item">Logout</li>
            </ul>
          </div>
          
          <script>
            const btn = document.getElementById('dropdownBtn');
            const menu = document.getElementById('dropdownMenu');
          
            btn.addEventListener('click', () => {
              menu.classList.toggle('open');
            });
          
            document.addEventListener('click', (e) => {
              if (!e.target.closest('.dropdown')) {
                menu.classList.remove('open');
              }
            });
          </script>
          
</body>
