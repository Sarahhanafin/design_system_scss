<body>

    <h1>Dropdown</h1>
    
    <p>...</p>

        </br>

        <div class="dropdown">
            <button class="dropdown__toggle" type="button">
              <span class="dropdown__label">SELECT</span>
              <span class="dropdown__icon" aria-hidden="true"></span>
            </button>
          
            <ul class="dropdown__menu">
              <li><button type="button">Option One</button></li>
              <li><button type="button">Option Two</button></li>
              <li><button type="button">Option Three</button></li>
            </ul>
          </div>

          <script>
            const dropdown = document.querySelector(".dropdown");
            const toggle = dropdown.querySelector(".dropdown__toggle");
            const label = dropdown.querySelector(".dropdown__label");
            const options = dropdown.querySelectorAll(".dropdown__menu button");
          
            toggle.addEventListener("click", () => {
              dropdown.classList.toggle("is-open");
            });
          
            options.forEach(option => {
              option.addEventListener("click", () => {
                label.textContent = option.textContent;
                dropdown.classList.remove("is-open");
              });
            });
          
            document.addEventListener("click", e => {
              if (!dropdown.contains(e.target)) {
                dropdown.classList.remove("is-open");
              }
            });
          </script>
          
         
          
</body>
